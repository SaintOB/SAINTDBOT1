<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing cache — SaintDBot</title>
    <style>
        body {
            margin: 0;
            background: #070d1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .box { max-width: 420px; padding: 40px 24px; }
        h1 { font-size: 1.6rem; margin-bottom: 8px; color: #f0b429; }
        p  { color: #aac; line-height: 1.6; margin-bottom: 24px; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #1a2a4a;
            border-top-color: #f0b429; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .done { color: #4caf50; font-weight: 600; display: none; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner" id="spinner"></div>
    <h1>Refreshing SaintDBot</h1>
    <p>Clearing stale data and reloading — this only takes a second.</p>
    <p class="done" id="done">Done! Redirecting you now…</p>
</div>
<script>
(async () => {
    try {
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
        }

        // 2. Clear all caches
        if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
        }

        // 3. Clear localStorage + sessionStorage
        localStorage.clear();
        sessionStorage.clear();

        // 4. Show done, then redirect
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('done').style.display = 'block';

        setTimeout(() => {
            window.location.replace('/?_cb=' + Date.now());
        }, 800);
    } catch (e) {
        window.location.replace('/');
    }
})();
</script>
</body>
</html>
