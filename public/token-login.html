<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaintDBot — API Token Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0e0e0e;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,.5);
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff444f;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #f0f0f0;
            font-size: 14px;
            font-family: monospace;
            outline: none;
            transition: border-color .2s;
        }
        input[type="text"]:focus { border-color: #ff444f; }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: #ff444f;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s, opacity .2s;
        }
        button:hover { background: #e03040; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        .status {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .status.error { background: #2a0f10; border: 1px solid #6b1a1d; color: #f88; display: block; }
        .status.success { background: #0e2a18; border: 1px solid #1a6b3a; color: #6f6; display: block; }
        .status.loading { background: #1a1a2a; border: 1px solid #2a2a6b; color: #88f; display: block; }
        .hint {
            margin-top: 24px;
            padding: 14px;
            background: #111;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .hint a { color: #ff444f; text-decoration: none; }
        .hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">SaintDBot</div>
    <h1>Log in with API Token</h1>
    <p>Enter your Deriv API token to log in. Your token needs <strong>Read</strong> and <strong>Trade</strong> scopes.</p>

    <label for="token">Deriv API Token</label>
    <input type="text" id="token" placeholder="Paste your API token here…" autocomplete="off" spellcheck="false" />

    <button id="loginBtn" onclick="doLogin()">Log in</button>

    <div class="status" id="status"></div>

    <div class="hint">
        To get your API token, go to <a href="https://app.deriv.com/account/api-token" target="_blank">app.deriv.com → API Token</a>, create a token with <strong>Read</strong> and <strong>Trade</strong> scopes, and paste it above.
    </div>
</div>

<script>
async function doLogin() {
    const tokenInput = document.getElementById('token');
    const btn = document.getElementById('loginBtn');
    const status = document.getElementById('status');
    const apiToken = tokenInput.value.trim();

    if (!apiToken) {
        showStatus('error', 'Please paste your API token first.');
        return;
    }

    btn.disabled = true;
    showStatus('loading', 'Connecting to Deriv…');

    try {
        const result = await authorizeWithToken(apiToken);

        if (result.error) {
            showStatus('error', 'Invalid token: ' + (result.error.message || 'Please check your token and try again.'));
            btn.disabled = false;
            return;
        }

        const auth = result.authorize;
        const accountList = result.account_list || auth.account_list || [];

        // Build localStorage entries in the same format as the OAuth flow
        const accountsList = {};
        const clientAccounts = {};

        accountList.forEach(account => {
            const id = account.loginid;
            const tok = account.token || apiToken;
            accountsList[id] = tok;
            clientAccounts[id] = { loginid: id, token: tok, currency: account.currency };
        });

        // Fallback: use the primary account from authorize response
        if (Object.keys(accountsList).length === 0) {
            const id = auth.loginid;
            accountsList[id] = apiToken;
            clientAccounts[id] = { loginid: id, token: apiToken, currency: auth.currency };
        }

        localStorage.setItem('accountsList', JSON.stringify(accountsList));
        localStorage.setItem('clientAccounts', JSON.stringify(clientAccounts));
        localStorage.setItem('authToken', apiToken);
        localStorage.setItem('active_loginid', auth.loginid);
        if (auth.country) localStorage.setItem('client.country', auth.country);

        showStatus('success', 'Logged in as ' + auth.loginid + '! Redirecting…');
        setTimeout(() => { window.location.href = '/'; }, 1200);

    } catch (err) {
        showStatus('error', 'Connection failed: ' + err.message);
        btn.disabled = false;
    }
}

function authorizeWithToken(token) {
    return new Promise((resolve, reject) => {
        const appId = 36300;
        const wsUrl = `wss://ws.derivws.com/websockets/v3?app_id=${appId}&l=EN&brand=deriv`;
        const ws = new WebSocket(wsUrl);
        let settled = false;

        const timeout = setTimeout(() => {
            if (!settled) {
                settled = true;
                ws.close();
                reject(new Error('Connection timed out. Please try again.'));
            }
        }, 15000);

        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (event) => {
            if (settled) return;
            clearTimeout(timeout);
            settled = true;
            ws.close();
            try {
                resolve(JSON.parse(event.data));
            } catch (e) {
                reject(new Error('Invalid response from server.'));
            }
        };

        ws.onerror = () => {
            if (!settled) {
                settled = true;
                clearTimeout(timeout);
                reject(new Error('WebSocket connection error.'));
            }
        };
    });
}

function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
}

document.getElementById('token').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
